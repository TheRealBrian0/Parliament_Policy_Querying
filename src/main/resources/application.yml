spring:
  application:
    name: policy-pulse-rag
  datasource:
    url: jdbc:mysql://localhost:3306/policy_pulse?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root_pass
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  graphql:
    graphiql:
      enabled: true
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: policy-pulse-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.policypulse.*
        spring.json.value.default.type: com.policypulse.kafka.event.DocumentScrapedEvent
        spring.json.use.type.headers: false

server:
  port: 8080

app:
  topics:
    session-data-scraped: session-data-scraped
  chromadb:
    url: http://localhost:8000
  ollama:
    base-url: http://localhost:11435
    chat-model: llama3.1:8b
    embedding-model: nomic-embed-text:latest
